          <div class="sticky-actions"><button class="primary" type="button" data-action="goto" data-view="breakdown">Back to breakdown</button></div>`;
      }

      const url = buildShareUrl();
      const msg = shareMessageText(url);
      const smsHref = "sms:?&body=" + encodeURIComponent(msg);
      const mailHref = "mailto:?subject=" + encodeURIComponent("Quick Skins payouts" + (round.courseName ? " — " + round.courseName : "")) + "&body=" + encodeURIComponent(msg);

      return `
        <section class="section">
          <p class="subhead">Share results</p>
          ${meta ? `<p class="round-meta">${meta}</p>` : ""}
          <p class="lead" style="margin-bottom:10px;">Text or email the group a picture of the payouts, plus a link that opens this exact round &mdash; scores, players, and buy-ins &mdash; in Quick Skins.</p>

          <div class="share-preview" id="sharePreview"><span class="share-preview-loading">Building the payout picture&hellip;</span></div>

          <div class="share-actions">
            <button class="primary" type="button" data-action="share-results">Share picture &amp; link</button>
            <div class="share-grid">
              <a class="share-chip" href="${escapeHtml(smsHref)}">Text the link</a>
              <a class="share-chip" href="${escapeHtml(mailHref)}">Email the link</a>
              <button class="secondary" type="button" data-action="copy-share-link">Copy link</button>
              <button class="secondary" type="button" data-action="download-share-image">Save picture</button>
            </div>
          </div>
          <p class="lead" style="margin:14px 0 0;">Anyone who opens the link gets the whole round &mdash; the hole-by-hole breakdown and these payouts &mdash; right on their phone. Nothing is uploaded; the round travels inside the link itself.</p>
        </section>

        <div class="sticky-actions cols-2">
          <button class="secondary" type="button" data-action="goto" data-view="payouts">Back to payouts</button>
          <button class="primary" type="button" data-action="reimport">Import another round</button>
        </div>`;
    }

    // Live-update the payout figures while a buy-in changes, patching text in
    // place instead of re-rendering. This keeps the input focused and, crucially,
    // means action buttons aren't rebuilt mid-click (so "Apply to all" and the
    // nav buttons work on the first tap, not the second).
    function refreshPayouts() {
      if (app.view !== "payouts" || !app.round) return;
      const r = computeSkins(app.round);
      const perHole = document.querySelector('[data-metric="perHole"]');
      if (perHole) perHole.textContent = perHoleLabel(r);
      const totalPot = document.querySelector('[data-metric="totalPot"]');
      if (totalPot) totalPot.textContent = fmtMoney(r.totalPot);
      document.querySelectorAll("[data-card]").forEach(card => {
        const p = r.players.find(x => x.name === card.dataset.card);
        if (!p) return;
        const isWinner = p.net === r.topNet && r.topNet > 0;
        card.classList.toggle("is-winner", isWinner);
        // Winner shows the gold band (no inline var); everyone else keeps their
        // emblem color, restored from data-color in case the winner just shifted.
        if (isWinner) card.style.removeProperty("--card-color");
        else card.style.setProperty("--card-color", card.dataset.color);
        const nameEl = card.querySelector('[data-field="name"]');
        if (nameEl) nameEl.textContent = p.name + (isWinner ? " \u{1F3C6}" : "");
        const netEl = card.querySelector('[data-field="net"]');
        if (netEl) {
          netEl.textContent = fmtSignedMoney(p.net);
          netEl.className = "result-net " + (p.net > 0 ? "pos" : p.net < 0 ? "neg" : "even");
        }
        const wonEl = card.querySelector('[data-field="won"]');
        if (wonEl) wonEl.textContent = fmtMoney(p.moneyWon);
        const paidEl = card.querySelector('[data-field="paidIn"]');
        if (paidEl) paidEl.textContent = fmtMoney(p.contribution);
        const splitEl = card.querySelector('[data-field="splitNote"]');
        if (splitEl) splitEl.textContent = p.skinSplitRefund ? "(−" + fmtMoney(p.skinSplitRefund) + " skin split)" : "";
      });
      const guidance = document.getElementById("paymentGuidance");
      if (guidance) guidance.innerHTML = paymentGuidanceInner(r);
    }

    /* ------------------------------------------------------------------ *
     * Import / ingest
     * ------------------------------------------------------------------ */
    function ingestRound(text) {
      const result = parseRound(text);
      if (result.error) { app.importError = result.error; render(); return; }
      result.players.forEach(p => { p.included = true; p.buyIn = num(app.defaultBuyIn, 1); });
      app.round = result;
      app.importError = "";
      app.showHoles = true;
      app.view = "breakdown";
      save();
      render();
      window.scrollTo(0, 0);
      toast("Imported " + pluralize(result.players.length, "player") + " — pick who's in.");
    }

    function handleFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => ingestRound(String(e.target.result || ""));
      reader.onerror = () => { app.importError = "Couldn't read that file."; render(); };
      reader.readAsText(file);
    }

    function clearStoredData() {
      try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* storage may be unavailable */ }
      if ("caches" in window) {
        caches.open("quick-skins-shared")
          .then(cache => cache.delete("./shared-csv-data"))
          .catch(() => {});
      }
      app.view = "import";
      app.defaultBuyIn = 1;
      app.pasteInput = "";
      app.importError = "";
      app.showHoles = true;
      app.round = null;
      shareCanvas = null;
      shareImageBlob = null;
      render();
      window.scrollTo(0, 0);
      toast("Stored Quick Skins data cleared.");
    }

    /* ------------------------------------------------------------------ *
     * Event wiring (delegation)
     * ------------------------------------------------------------------ */
    document.addEventListener("click", e => {
      const btn = e.target.closest("[data-action]");
      if (!btn) return;
      const action = btn.dataset.action;

      switch (action) {
        case "goto": {
          const view = btn.dataset.view;
          if (view !== "import" && !app.round) { toast("Import a round first."); return; }
          if ((view === "payouts" || view === "share") && includedPlayers().length < 2) { toast("Keep at least 2 players in first."); return; }
          app.view = view;
          app.importError = "";
          save(); render(); window.scrollTo(0, 0);
          break;
        }
        case "toggle-player": {
          if (!app.round) break;
          const name = decodeURIComponent(btn.dataset.name);
          const p = app.round.players.find(x => x.name === name);
          if (p) { p.included = p.included === false; save(); render(); }
          break;
        }
        case "apply-all":
          includedPlayers().forEach(p => { p.buyIn = num(app.defaultBuyIn, 1); });
          save(); render();
          toast("All players set to " + fmtMoney(num(app.defaultBuyIn, 1)) + " per hole.");
          break;
        case "pick-file":
          document.getElementById("csvFile").click();
          break;
        case "parse-paste":
          if (app.pasteInput.trim()) ingestRound(app.pasteInput);
          break;
        case "install-app":
          promptInstallApp();
          break;
        case "clear-stored-data":
          clearStoredData();
          break;
        case "toggle-holes":
          app.showHoles = !app.showHoles;
          render();
          break;
        case "choose-settlement": {
          if (!app.round) break;
          const mode = btn.dataset.mode; // "ctp" | "split"
          app.round.pushSettlement = mode;
          if (mode === "split") app.round.ctpWinner = null;
          save(); render();
          if (mode === "split") toast("Remaining skins split back to the players.");
          break;
        }
        case "award-ctp": {
          if (!app.round) break;
          const sel = document.getElementById("ctpWinnerSelect");
          const name = sel ? sel.value : "";
          if (!name) { toast("Choose a player for the CTP win first."); break; }
          app.round.ctpWinner = name;
          save(); render();
          toast(name + " claims the carryover.");
          break;
        }
        case "clear-push-settlement":
          if (!app.round) break;
          app.round.pushSettlement = null;
          app.round.ctpWinner = null;
          save(); render();
          break;
        case "share-results":
          shareResults();
          break;
        case "copy-share-link":
          copyShareLink();
          break;
        case "download-share-image":
          downloadShareImage();
          break;
        case "reimport":
          app.round = null;
          app.pasteInput = "";
          app.importError = "";
          app.view = "import";
          shareCanvas = null;
          shareImageBlob = null;
          save(); render(); window.scrollTo(0, 0);
          break;
      }
    });

    // Keyboard activation for the drop zone.
    document.addEventListener("keydown", e => {
      if ((e.key === "Enter" || e.key === " ") && e.target.id === "dropZone") {
        e.preventDefault();
        document.getElementById("csvFile").click();
      }
    });

    // Inputs (number fields, paste). Values are stored on input; figures
    // recalculate on blur (change) so typing never loses focus.
    document.addEventListener("input", e => {
      const el = e.target;
      const action = el.dataset ? el.dataset.action : null;
      if (action === "edit-default") { app.defaultBuyIn = el.value === "" ? "" : num(el.value, 0); save(); return; }
      if (action === "edit-paste") {
        app.pasteInput = el.value;
        const calcBtn = document.querySelector('[data-action="parse-paste"]');
        if (calcBtn) calcBtn.disabled = !el.value.trim();
        return;
      }
      if (action === "edit-round-buyin" && app.round) {
        const name = decodeURIComponent(el.dataset.name);
        const rp = app.round.players.find(x => x.name === name);
        if (rp) { rp.buyIn = el.value === "" ? "" : num(el.value, 0); save(); refreshPayouts(); }
        return;
      }
    });

    document.addEventListener("change", e => {
      const el = e.target;
      if (el.id === "csvFile") {
        handleFile(el.files && el.files[0]);
        el.value = "";
      }
    });

    // Drag & drop on the import drop zone.
    document.addEventListener("dragover", e => {
      const dz = e.target.closest && e.target.closest("#dropZone");
      if (dz) { e.preventDefault(); dz.classList.add("is-dragover"); }
    });
    document.addEventListener("dragleave", e => {
      const dz = e.target.closest && e.target.closest("#dropZone");
      if (dz) dz.classList.remove("is-dragover");
    });
    document.addEventListener("drop", e => {
      const dz = e.target.closest && e.target.closest("#dropZone");
      if (!dz) return;
      e.preventDefault();
      dz.classList.remove("is-dragover");
      const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    // A CSV shared into the installed app lands here: the service worker
    // stashed it, redirected to ?share=1, and we pick it up on load.
    async function checkSharedFile() {
      const params = new URLSearchParams(location.search);
      if (!params.has("share")) return false;
      let handled = false;
      try {
        const cache = await caches.open("quick-skins-shared");
        const resp = await cache.match("./shared-csv-data");
        if (resp) {
          const text = await resp.text();
          await cache.delete("./shared-csv-data");
          if (text.trim()) { ingestRound(text); handled = true; }
        }
      } catch (e) { /* no cache / not installed */ }
      history.replaceState(null, "", location.pathname);
      if (!handled) toast("Couldn't read the shared file — try the import screen.");
      return handled;
    }

    /* ------------------------------------------------------------------ *
     * Boot
     * ------------------------------------------------------------------ */
    load();
    // A #r= share link overrides any saved state — the recipient should land
    // on the shared round's breakdown, just like the original importer did.
    const openedFromShareLink = checkSharedRoundLink();
    render();
    if (!openedFromShareLink) checkSharedFile();

    window.addEventListener("beforeinstallprompt", e => {
      e.preventDefault();
      deferredInstallPrompt = e;
    });

    window.addEventListener("appinstalled", () => {
      deferredInstallPrompt = null;
      render();
      toast("Quick Skins installed.");
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
